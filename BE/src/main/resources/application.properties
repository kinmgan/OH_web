spring.config.import=optional:file:./.env
spring.main.allow-bean-definition-overriding=true
spring.application.name=OrientalHerbs

server.servlet.async.request-timeout=300000
server.error.include-message=always

# Multipart limit for file uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

spring.datasource.url=jdbc:postgresql://localhost:5432/oriental_herbs_db
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.hibernate.ddl-auto=update

orientalherbs.app.jwtSecret=${JWT_SECRET:}
orientalherbs.app.jwtExpirationMs=${JWT_EXPIRATION:86400000}

server.servlet.context-path=/api/v1

# Payment Gateway Configuration
payment.vnpay.tmn-code=${VNPAY_TMN_CODE:example}
payment.vnpay.hash-secret=${VNPAY_HASH_SECRET:example}
payment.vnpay.url=${VNPAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
payment.vnpay.return-url=${VNPAY_RETURN_URL:http://localhost:3000/dat-hang/{id}/thanh-toan/result}
payment.vnpay.ipn-url=${VNPAY_IPN_URL:http://localhost:8080/api/v1/payment/vnpay/ipn}

payment.momo.partner-code=${MOMO_PARTNER_CODE:example}
payment.momo.access-key=${MOMO_ACCESS_KEY:example}
payment.momo.secret-key=${MOMO_SECRET_KEY:example}
payment.momo.api-url=${MOMO_API_URL:https://test-payment.momo.vn/v2/gateway/api/create}
payment.momo.redirect-url=${MOMO_REDIRECT_URL:http://localhost:3000/dat-hang/{id}/thanh-toan/result}
payment.momo.ipn-url=${MOMO_IPN_URL:http://localhost:8080/api/v1/payment/momo/ipn}

payment.zalopay.app-id=${ZALOPAY_APP_ID:example}
payment.zalopay.key1=${ZALOPAY_KEY1:example}
payment.zalopay.key2=${ZALOPAY_KEY2:example}
payment.zalopay.api-url=${ZALOPAY_API_URL:https://sb-openapi.zalopay.vn/v2/create}
payment.zalopay.callback-url=${ZALOPAY_CALLBACK_URL:http://localhost:8080/api/v1/payment/zalopay/ipn}

payment.bank.account-number=${BANK_ACCOUNT_NUMBER:example}
payment.bank.account-name=${BANK_ACCOUNT_NAME:example}
payment.bank.bank-name=${BANK_NAME:example}
payment.bank.bank-bin=${BANK_BIN:example}

# ===== AI Service integration =====
ai.service.url=${AI_SERVICE_URL:http://ai-service:8000}
ai.internal.token=${AI_INTERNAL_TOKEN:dev-secret-change-me}
# ai.service.timeout.connect / ai.service.timeout.read intentionally not used;
# AiChatbotController uses a hardcoded READ_TIMEOUT_MS constant instead.

logging.level.org.springframework.security=TRACE
logging.level.org.springframework.web=TRACE

# Google OAuth2 (Spring Boot auto-config)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:example-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:example-client-secret}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=sub

# Email SMTP Configuration (Brevo)
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=${BREVO_SMTP_LOGIN:example_login}
spring.mail.password=${BREVO_SMTP_KEY:example_key}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.default-encoding=UTF-8
app.mail.sender=tkngan666@gmail.com

# Contact form
app.contact.admin-email=${CONTACT_ADMIN_EMAIL:tkngan666@gmail.com}

# Gemini AI
gemini.enabled=${GEMINI_ENABLED:true}
gemini.api-keys=${GEMINI_API_KEYS:}
gemini.model=${GEMINI_MODEL:gemini-2.5-flash}
gemini.max-history-per-session=10
gemini.rate-limit-per-minute=15
gemini.review-ai-enabled=${GEMINI_REVIEW_AI_ENABLED:true}
gemini.chatbot-max-sessions=500
gemini.chatbot-session-ttl-minutes=30
