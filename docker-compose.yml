services:
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    restart: always
    environment:
      - POSTGRES_DB=oriental_herbs_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=ngan123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d oriental_herbs_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./BE
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/oriental_herbs_db
    env_file:
      - ./BE/.env

  frontend:
    build:
      context: ./fe
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    restart: always
    depends_on:
      - backend
    environment:
      - INTERNAL_API_URL=http://backend:8080/api/v1
    env_file:
      - ./fe/.env.local

  frontend-admin:
    build:
      context: ./fe-admin
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    restart: always
    depends_on:
      - backend
    environment:
      - INTERNAL_API_URL=http://backend:8080/api/v1
    env_file:
      - ./fe-admin/.env.local

  qdrant:
    image: qdrant/qdrant:latest
    container_name: oh_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

  ai_service:
    build:
      context: ./ai_service
      dockerfile: Dockerfile
    container_name: oh_ai_service
    ports:
      - "8000:8000"
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      qdrant:
        condition: service_started
    environment:
      - DATABASE_URL=postgresql://postgres:ngan123@db:5432/oriental_herbs_db
      - QDRANT_URL=http://qdrant:6333
    env_file:
      - ./ai_service/.env

volumes:
  postgres_data:
  qdrant_storage:
    driver: local
